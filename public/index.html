<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths Support</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #7fff6e;
      --accent-dim: #7fff6e22;
      --radius: 4px;
      --mono: 'DM Mono', monospace;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--mono); font-size: 14px;
      display: flex; flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .logo { font-size: 15px; color: var(--accent); letter-spacing: 1px; }
    .status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* MAIN */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .box {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .box-title {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }

    .input-row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--mono); font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      padding: 12px 20px;
      background: var(--accent); color: #0e0e0e;
      border: none; border-radius: var(--radius);
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      cursor: pointer; letter-spacing: .5px; transition: opacity .15s;
      white-space: nowrap;
    }
    button:hover { opacity: .85; }

    .hint { margin-top: 12px; font-size: 11px; color: var(--muted); line-height: 1.7; }
    .hint span { color: var(--accent); }

    .error {
      display: none; margin-top: 12px; padding: 10px 14px;
      background: #2a0000; border: 1px solid #550000;
      border-radius: var(--radius); font-size: 12px; color: #ff6b6b;
    }

    /* SHORTCUTS */
    .shortcuts {
      width: 100%; max-width: 560px; margin-top: 16px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .shortcut {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 11px; color: var(--muted);
      cursor: pointer; text-align: center; transition: all .15s;
      user-select: none;
    }
    .shortcut:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .shortcut-icon { font-size: 16px; margin-bottom: 4px; }

    footer {
      padding: 14px 32px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
      display: flex; justify-content: space-between;
    }

    @media (max-width: 500px) {
      .shortcuts { grid-template-columns: repeat(2, 1fr); }
      .box { padding: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">Maths Support</span>
  <span class="status"><span class="dot"></span> online</span>
</nav>

<main>
  <div class="box">
    <div class="box-title">Enter URL or search</div>
    <div class="input-row">
      <input id="ms-input" type="text"
        placeholder="https://example.com or search query..."
        autocomplete="off" spellcheck="false"/>
      <button onclick="msGo()">Go</button>
    </div>
    <p class="hint">
      Paste any <span>URL</span> to proxy it, or type a query to search via <span>Google</span>.
    </p>
    <div class="error" id="ms-error"></div>
  </div>

  <div class="shortcuts">
    <div class="shortcut" onclick="msOpen('https://www.youtube.com')">
      <div class="shortcut-icon">▶</div>YouTube
    </div>
    <div class="shortcut" onclick="msOpen('https://www.google.com')">
      <div class="shortcut-icon">⌕</div>Google
    </div>
    <div class="shortcut" onclick="msOpen('https://www.reddit.com')">
      <div class="shortcut-icon">◈</div>Reddit
    </div>
    <div class="shortcut" onclick="msOpen('https://discord.com/app')">
      <div class="shortcut-icon">◉</div>Discord
    </div>
  </div>
</main>

<footer>
  <span>Maths Support Proxy</span>
  <span>Powered by Scramjet</span>
</footer>

<!-- Scramjet -->
<script src="/scram/scramjet.config.js"></script>
<script src="/scram/scramjet.all.js"></script>
<script src="/baremux/index.js"></script>
<script>
  const scram = new ScramjetController(__scramjet$config);

  async function initScramjet() {
    try {
      await BareMux.SetTransport("/epoxy/index.js", {
        wisp: `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/wisp/`
      });
      await scram.init("/scram/scramjet.worker.js");
    } catch(e) { console.warn("Scramjet init:", e.message); }
  }
  initScramjet();

  function msGo() {
    const errEl = document.getElementById("ms-error");
    errEl.style.display = "none";
    let val = document.getElementById("ms-input").value.trim();
    if (!val) return;
    let target;
    if (/^https?:\/\//i.test(val)) target = val;
    else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(val) && !val.includes(" ")) target = "https://" + val;
    else target = "https://www.google.com/search?q=" + encodeURIComponent(val);
    try { location.href = scram.encodeUrl(target); }
    catch(e) { errEl.textContent = "Could not open: " + e.message; errEl.style.display = "block"; }
  }

  function msOpen(url) {
    document.getElementById("ms-input").value = url;
    msGo();
  }

  document.getElementById("ms-input").addEventListener("keydown", e => {
    if (e.key === "Enter") msGo();
  });
</script>
</body>
</html>
